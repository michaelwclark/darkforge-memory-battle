# Active judge configuration.
#
# DEFAULT: Ollama qwen2.5:14b-instruct. Local, zero network, zero subscription
# cost. Used for all development work, variance sweeps, new-contestant probes.
# Marked `battle_eligible=false` because the SOW pin is claude-sonnet-4-6.
#
# For BATTLE-ELIGIBLE publishable runs, load `config/judge.battle.yaml`
# (OpenRouter → claude-sonnet-4-6). That path bills openrouter.ai credits
# directly, leaving Michael's Claude Code subscription 100% free for
# interactive coding work.
#
# Provider matrix (all implemented in judge.py):
#   - ollama      : local qwen2.5:14b, free, dev only
#   - openai      : gpt-4o-mini via OPENAI_API_KEY, validation only
#   - anthropic   : Claude via direct API, battle-eligible, uses API credits
#   - claude_cli  : Claude via `claude -p` CLI, DEPRECATED for the harness
#                   (competes with interactive Claude Code subscription usage)
#   - openrouter  : any model via OPENROUTER_API_KEY, battle-eligible when
#                   model=claude-sonnet-4-6

judge:
  provider: ollama
  model: qwen2.5:14b-instruct
  temperature: 0.0
  max_tokens: 1024
  system_prompt_version: "v1"
  rubric_version: "v2"

embedding:
  provider: "ollama"
  model: "nomic-embed-text:latest"
  dimensions: 768
