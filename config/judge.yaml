# Pinned judge configuration.
#
# The SOW-pinned battle judge is Claude Sonnet 4.6 (Anthropic, temp=0). All
# publishable battle results must use that configuration and it must not
# change mid-battle.
#
# This file is the ACTIVE judge. It may deviate from the SOW-pinned judge
# during pipeline-validation / harness-bringup runs (e.g. when the Anthropic
# account balance is low), and results from such runs are NOT battle-eligible.
# Every result JSON records judge.provider + judge.model + judge.temperature
# so provenance is unambiguous.
#
# SOW-pinned (battle-eligible) configuration:
#   provider: anthropic
#   model: claude-sonnet-4-6
#   temperature: 0.0
#
# Current ACTIVE configuration (pipeline validation while Anthropic balance tops up):
judge:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 1024
  system_prompt_version: "v1"
  rubric_version: "v1"

# SOW-pinned embedder for cross-contestant apples-to-apples controls.
embedding:
  provider: "ollama"
  model: "nomic-embed-text:latest"
  dimensions: 768
